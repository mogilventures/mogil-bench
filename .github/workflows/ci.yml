name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      # Conformance tests instantiate Harbor's real Daytona adapter against
      # provider doubles, so install the reviewed optional SDK in this job.
      - run: python -m pip install -e '.[dev,daytona]'
      - run: pytest -q -m "not docker_smoke"
      - run: ruff check .
      - run: mypy
      - name: Credential-free artifact smoke test
        run: |
          mogil-bench pack validate packs/sample-v1.yaml
          mogil-bench run packs/sample-v1.yaml --output-dir /tmp/mogil-bench-ci
          mogil-bench artifact validate /tmp/mogil-bench-ci/blindbench.json

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: docker info
      - name: Mandatory Harbor Docker smoke
        run: pytest -q -m docker_smoke tests/test_harbor_docker_smoke.py
